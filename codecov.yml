coverage:
  status:
    project:
      default:
        # "auto" = don't let project coverage drop vs the base commit.
        # `threshold` gives a small allowance for noise (e.g. coverage of a
        # refactor that moves uncovered lines around).
        target: auto
        threshold: 0.5%
        informational: false
    patch:
      default:
        # Every PR's *new* lines must hit this bar.
        target: 70%
        threshold: 5%
        informational: false

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false

ignore:
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.config.{ts,js,mjs,cjs}"
  - "apps/web/.next/**"
  - "apps/web/e2e/**"
  - "apps/web/src/app/**"
  - "apps/server/src/index.ts"
  - "node_modules/**"
  - "**/dist/**"
  - "coverage/**"
