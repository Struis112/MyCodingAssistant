name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, unit tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      # CI is Linux-only, so oxfmt's historical Linux/Windows output drift
      # doesn't apply here. The pre-commit husky hook (oxfmt + oxlint --fix)
      # keeps local commits tidy; this step catches anything that slips past it.
      - name: Format check (oxfmt)
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unused deps / exports (knip)
        run: npm run lint:deps

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            apps/*/coverage/lcov.info
          retention-days: 7

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: apps/server/coverage/lcov.info,apps/web/coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx --workspace=@mca/web playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [verify, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mycodingassistant
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=tag

      # Build once into the runner's local Docker so Trivy can scan the exact
      # bits we're about to publish. The follow-up `Build & push` step re-uses
      # the GHA layer cache, so the second build is effectively free.
      - name: Build (local, for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pick first tag for scan
        id: scan-tag
        run: |
          first_tag=$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "tag=${first_tag}" >> "$GITHUB_OUTPUT"

      - name: Trivy image scan (HIGH+CRITICAL fails)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.scan-tag.outputs.tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Build & push (scan passed)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
